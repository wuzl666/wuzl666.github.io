style="color:black ; font-size:50px">命令的使用</h1>
<ul>
<li>ls -l 列举在该文件路径下的目标文件及详细信息</li>
<li>grep 词X 文件A : 从文件A中找词X</li>
<li>wc（word count）数字数</li>
<li>tar -xf 将压缩包中的所有文件解压缩出来，-x是解开意思</li>
<li>tar -cf 将所有指定文件打成一个  .tar的包。-c是表示产生新的包 ，-f是指定包的文件名</li>
